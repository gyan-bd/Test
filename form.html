<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Google Form</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* স্ক্রলবার যেন পেজে থাকে তাই overflow: hidden সরাবেন না যদি পুরো স্ক্রিন চান */
        }

        .form-container {
            width: 100%;
            /* এটি হাইটকে অটো রাখবে যাতে ফর্মের পুরো কন্টেন্ট দেখা যায় */
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
        }

        iframe {
            width: 100%;
            /* উচ্চতা এমনভাবে দেওয়া হয়েছে যাতে কন্টেন্ট অনুযায়ী বড় হয় */
            height: 100vh; 
            border: none;
        }

        /* ডেস্কটপের জন্য বিশেষ ব্যবস্থা */
        @media screen and (min-width: 768px) {
            iframe {
                height: 100vh; /* ডেস্কটপে ফুল স্ক্রিন হাইট */
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <iframe src="https://forms.gle/JCgXDfxxC8rTMyNv5" allowfullscreen>Loading…</iframe>
    </div>

</body>
</html>
